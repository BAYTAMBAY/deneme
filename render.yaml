databases:
  - name: oneticketaway-db
    databaseName: oneticketaway_production
    user: oneticketaway
    plan: free

services:
  - type: web
    name: oneticketaway-web
    runtime: ruby
    plan: free
    buildCommand: bin/render-build.sh
    startCommand: bin/render-start.sh
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oneticketaway-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: APP_HOST
        value: oneticketaway.com
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY_BASE
        sync: false
